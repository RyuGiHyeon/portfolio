<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — 류기현 (Jeff)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:76px}
:root{
  --green:#12b886;--green-lt:#e6fcf5;--green-dk:#0ca678;
  --bg:#f8f9fa;--surface:#ffffff;--border:#e9ecef;
  --text:#212529;--text-2:#495057;--text-3:#868e96;--text-4:#adb5bd;
  --sans:'Noto Sans KR',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px}
a{text-decoration:none;color:inherit}

nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:60px}
.nav-logo{font-size:1rem;font-weight:700;color:var(--green)}
.nav-links{display:flex;align-items:center;gap:0.2rem;list-style:none}
.nav-links a{font-size:0.82rem;color:var(--text-2);padding:0.4rem 0.8rem;border-radius:6px;transition:all .15s}
.nav-links a:hover{background:var(--green-lt);color:var(--green)}
.nav-links a.active{background:var(--green-lt);color:var(--green);font-weight:500}
.nav-contact-btn{font-size:0.8rem;font-weight:500;padding:0.42rem 1.1rem;background:var(--green);color:#fff;border-radius:20px;margin-left:0.5rem}
.nav-contact-btn:hover{background:var(--green-dk);color:#fff}

.page{width:min(1380px,96vw);margin:0 auto;padding:2.5rem 1rem 5rem}
.back-link{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.8rem;color:var(--text-3);margin-bottom:1rem;transition:color .15s}
.back-link:hover{color:var(--green)}

.layout{display:grid;grid-template-columns:250px minmax(0,1fr);gap:1.4rem;align-items:start}
.toc{position:sticky;top:76px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.9rem 0.85rem}
.toc-title{font-size:0.72rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.55rem}
.toc-links{display:flex;flex-direction:column;gap:0.3rem}
.toc-link{font-size:0.78rem;color:var(--text-3);line-height:1.4;padding:0.2rem 0.25rem;border-radius:6px}
.toc-link:hover{background:var(--green-lt);color:var(--green)}

.proj-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.proj-badge{font-size:0.68rem;padding:0.18rem 0.65rem;border-radius:10px;font-weight:600;display:inline-block;margin-bottom:0.8rem}
.pb-sec{background:#fff0f6;color:#c2255c}
.pb-back{background:#edf2ff;color:#4c6ef5}
.pb-net{background:#e3fafc;color:#0c8599}
.pb-ops{background:#f3f0ff;color:#7048e8}
.proj-header h1{font-size:1.5rem;font-weight:700;color:var(--text);line-height:1.35;letter-spacing:-0.02em;margin-bottom:0.6rem}
.proj-date{font-size:0.73rem;color:var(--text-4);margin-bottom:0.9rem}
.proj-stack{display:flex;flex-wrap:wrap;gap:0.4rem}
.proj-stack span{font-size:0.68rem;padding:0.18rem 0.6rem;border-radius:8px;background:var(--bg);color:var(--text-2);border:1px solid var(--border)}

.proj-overview{background:var(--green-lt);border-left:3px solid var(--green);border-radius:0 8px 8px 0;padding:1.1rem 1.3rem;margin-bottom:2rem;font-size:0.87rem;line-height:1.8;color:var(--text-2);font-weight:300}
.proj-section{margin-bottom:1.8rem}
.proj-section h3{font-size:0.9rem;font-weight:600;color:var(--text);margin-bottom:0.8rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border)}
.proj-section p{
  font-size:0.88rem;
  color:var(--text-2);
  font-weight:300;
  line-height:1.65;
  margin-bottom:0.85rem;
  white-space:pre-line;
}
.proj-section ul{list-style:none;display:flex;flex-direction:column;gap:0.5rem;padding-left:0}
.proj-section li{position:relative;padding-left:0.9rem;font-size:0.87rem;color:var(--text-2);font-weight:300;line-height:1.65}
.proj-section li::before{content:'·';position:absolute;left:0;top:0;color:var(--green);font-size:1rem}
.proj-section li strong{color:var(--text);font-weight:500}
.proj-section a{color:var(--green)}
.proj-section img{
  display:block;
  width:auto !important;
  max-width:min(100%,880px) !important;
  height:auto !important;
  max-height:520px !important;
  object-fit:contain;
  margin:0.75rem auto;
  border-radius:8px;
}
.proj-group{margin-bottom:2.2rem}
.proj-group h2{font-size:1.02rem;font-weight:700;color:var(--text);margin-bottom:0.9rem}
.proj-group-card{border:1px solid var(--border);background:var(--surface);border-radius:10px;padding:1rem}
.proj-subsection{margin-bottom:1.2rem}
.proj-subsection:last-child{margin-bottom:0}
.toc-link.sub{padding-left:0.85rem;font-size:0.74rem}

.proj-nav{display:flex;justify-content:space-between;align-items:center;margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border);gap:1rem}
.proj-nav-btn{font-size:0.78rem;color:var(--text-3);padding:0.5rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);transition:all .15s;max-width:48%}
.proj-nav-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-lt)}

footer{border-top:1px solid var(--border);margin-top:3rem;padding:1.5rem 5%;display:flex;justify-content:space-between;align-items:center}
footer p{font-size:0.73rem;color:var(--text-4)}
footer a{color:var(--green);font-weight:500}

@media(max-width:1100px){.page{width:min(1100px,95vw)}}
@media(max-width:860px){.layout{grid-template-columns:1fr}.toc{position:static}}
@media(max-width:560px){
  nav{padding:0 4%}
  .page{width:100%;padding:1.5rem 4% 4rem}
  .proj-section img{max-height:360px !important}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">ryugihyeon.dev</a>
  <ul class="nav-links">
    <li><a href="../index.html#projects" class="active">Projects</a></li>
    <li><a href="../blog.html">Blog</a></li>
    <li><a href="../index.html#credentials">Credentials</a></li>
    <li><a href="mailto:ryuoo0123@gmail.com" class="nav-contact-btn">Contact</a></li>
    <li><a href="../resume.html" target="_blank">Resume PDF</a></li>
  </ul>
</nav>

<div class="page">
  <a class="back-link" href="../index.html#projects">← Projects로</a>
  <div class="layout">
    <aside class="toc" id="proj-toc" style="display:none">
      <div class="toc-title">Contents</div>
      <div class="toc-links" id="proj-toc-links"></div>
    </aside>
    <div>
      <div id="proj-content"><p style="color:var(--text-4);font-size:0.85rem">로딩 중...</p></div>
      <div class="proj-nav">
        <a id="prev-proj" href="#" class="proj-nav-btn" style="visibility:hidden">← 이전 프로젝트</a>
        <a href="../index.html#projects" style="font-size:0.78rem;color:var(--text-3)">목록</a>
        <a id="next-proj" href="#" class="proj-nav-btn" style="visibility:hidden;text-align:right">다음 프로젝트 →</a>
      </div>
    </div>
  </div>
</div>

<footer>
  <p>© 2025 류기현 (Jeff) · <a href="https://github.com/RyuGiHyeon" target="_blank">GitHub</a></p>
  <p>Built with vanilla HTML · CSS · JS</p>
</footer>

<script src="../assets/js/data/common.js"></script>
<script src="../assets/js/data/projects.js"></script>
<script>
const catClass={Security:'sec',Backend:'back',Network:'net',DevOps:'ops',Container:'ops'};
const params=new URLSearchParams(location.search);
const title=params.get('title');
const idx=PROJECTS.findIndex(p=>p.title===title);
const p=PROJECTS[idx];

const toAnchorId=(title, i)=>
  `section-${i+1}-${title.toLowerCase().replace(/[^a-z0-9가-힣]+/g,'-').replace(/(^-|-$)/g,'')}`;

const GROUP_ORDER = [
  { key: 'overview', title: '프로젝트 개요' },
  { key: 'role', title: '담당 역할' },
  { key: 'outcome', title: '프로젝트 성과' }
];

function normalizeSectionHtml(html = '') {
  return String(html)
    .trim()
    .replace(/<p>\s+/g, '<p>')
    .replace(/\s+<\/p>/g, '</p>');
}

function detectGroup(title) {
  if (/(성과|수상|발표|연구|성능|결과)/.test(title)) return 'outcome';
  if (/(담당|역할|구현|개발|구성|분석|파이프라인|모니터링|테스트베드|프로토콜 확장)/.test(title)) return 'role';
  return 'overview';
}

if(!p){
  document.getElementById('proj-content').innerHTML='<p style="color:var(--text-4)">프로젝트를 찾을 수 없습니다.</p>';
}else{
  document.title=`${p.title} — 류기현 (Jeff)`;
  const bc=catClass[p.category]||'back';
  const sectionMeta=(p.detail.sections || []).map((s,i)=>({
    ...s,
    anchor: toAnchorId(s.title, i),
    group: s.group || detectGroup(s.title)
  }));

  const grouped = GROUP_ORDER.map(g => ({
    ...g,
    items: sectionMeta.filter(s => s.group === g.key)
  })).filter(g => g.items.length > 0);

  const groupsHtml=grouped.map(g=>`
    <div class="proj-group" id="group-${g.key}">
      <h2>${g.title}</h2>
      <div class="proj-group-card">
        ${g.items.map(s=>`
          <div class="proj-section proj-subsection" id="${s.anchor}">
            <h3>${s.title}</h3>
            ${normalizeSectionHtml(s.content)}
          </div>`).join('')}
      </div>
    </div>`).join('');

  document.getElementById('proj-content').innerHTML=`
    <div class="proj-header">
      <span class="proj-badge pb-${bc}">${p.category}</span>
      <h1>${p.title}</h1>
      <div class="proj-date">${p.date}</div>
      <div class="proj-stack">${p.stack.map(s=>`<span>${s}</span>`).join('')}</div>
    </div>
    <div class="proj-overview">${p.detail.overview}</div>
    ${groupsHtml}`;

  const toc=document.getElementById('proj-toc');
  const tocLinks=document.getElementById('proj-toc-links');
  if(grouped.length){
    toc.style.display='block';
    tocLinks.innerHTML=grouped.map(g=>`
      <a class="toc-link" href="#group-${g.key}">${g.title}</a>
      ${g.items.map(s=>`<a class="toc-link sub" href="#${s.anchor}">${s.title}</a>`).join('')}
    `).join('');
  }

  if(idx>0){
    const prev=document.getElementById('prev-proj');
    prev.href=`project.html?title=${encodeURIComponent(PROJECTS[idx-1].title)}`;
    prev.textContent=`← ${PROJECTS[idx-1].title.substring(0,22)}...`;
    prev.style.visibility='visible';
  }
  if(idx<PROJECTS.length-1){
    const next=document.getElementById('next-proj');
    next.href=`project.html?title=${encodeURIComponent(PROJECTS[idx+1].title)}`;
    next.textContent=`${PROJECTS[idx+1].title.substring(0,22)}... →`;
    next.style.visibility='visible';
  }
}
</script>
</body>
</html>
