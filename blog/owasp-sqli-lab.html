<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post — 류기현 (Jeff)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#12b886;--green-lt:#e6fcf5;--green-dk:#0ca678;
  --bg:#f8f9fa;--surface:#ffffff;--border:#e9ecef;
  --text:#212529;--text-2:#495057;--text-3:#868e96;--text-4:#adb5bd;
  --sans:'Noto Sans KR',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px}
a{text-decoration:none;color:inherit}

nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:60px}
.nav-logo{font-size:1rem;font-weight:700;color:var(--green)}
.nav-links{display:flex;align-items:center;gap:0.2rem;list-style:none}
.nav-links a{font-size:0.82rem;color:var(--text-2);padding:0.4rem 0.8rem;border-radius:6px;transition:all .15s}
.nav-links a:hover{background:var(--green-lt);color:var(--green)}
.nav-links a.active{background:var(--green-lt);color:var(--green);font-weight:500}
.nav-contact-btn{font-size:0.8rem;font-weight:500;padding:0.42rem 1.1rem;background:var(--green);color:#fff;border-radius:20px;margin-left:0.5rem}
.nav-contact-btn:hover{background:var(--green-dk);color:#fff}

.page{max-width:740px;margin:0 auto;padding:2.5rem 5% 5rem}

.back-link{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.8rem;color:var(--text-3);margin-bottom:2rem;transition:color .15s}
.back-link:hover{color:var(--green)}

.post-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.post-header-meta{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.9rem;flex-wrap:wrap}
.post-cat{font-size:0.68rem;padding:0.16rem 0.6rem;border-radius:10px;font-weight:600;background:var(--green-lt);color:var(--green)}
.post-cat.sec{background:#fff0f6;color:#c2255c}
.post-cat.back{background:#edf2ff;color:#4c6ef5}
.post-cat.iac{background:#fff4e6;color:#e67700}
.post-date{font-size:0.72rem;color:var(--text-4)}
.post-header h1{font-size:1.5rem;font-weight:700;color:var(--text);line-height:1.35;letter-spacing:-0.02em;margin-bottom:1rem}
.post-tags{display:flex;flex-wrap:wrap;gap:0.4rem}
.post-tag{font-size:0.7rem;color:var(--text-4);padding:0.15rem 0.55rem;background:var(--bg);border-radius:8px;border:1px solid var(--border)}

/* 본문 */
.post-body{line-height:1.85;color:var(--text-2)}
.post-body h3{font-size:1rem;font-weight:600;color:var(--text);margin:1.8rem 0 0.8rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border)}
.post-body p{font-size:0.88rem;margin-bottom:0.9rem;font-weight:300}
.post-body ul{list-style:none;display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem;padding-left:0.2rem}
.post-body li{font-size:0.88rem;color:var(--text-2);display:flex;align-items:flex-start;gap:0.6rem;font-weight:300;line-height:1.65}
.post-body li::before{content:'·';color:var(--green);font-size:1rem;flex-shrink:0;margin-top:-1px}
.post-body li strong{color:var(--text);font-weight:500}
.post-body pre{background:#1e1e2e;border-radius:10px;padding:1.2rem 1.4rem;overflow-x:auto;margin:1rem 0 1.2rem}
.post-body code{font-family:'Courier New',monospace;font-size:0.8rem;color:#cdd6f4;line-height:1.7}
.post-body pre code{display:block}
.post-body :not(pre)>code{background:var(--green-lt);border-radius:4px;padding:0.1rem 0.4rem;color:var(--green);font-size:0.82rem}

.post-nav{display:flex;justify-content:space-between;align-items:center;margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border);gap:1rem}
.post-nav-btn{font-size:0.78rem;color:var(--text-3);padding:0.5rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);transition:all .15s;max-width:48%}
.post-nav-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-lt)}

footer{border-top:1px solid var(--border);margin-top:3rem;padding:1.5rem 5%;display:flex;justify-content:space-between;align-items:center}
footer p{font-size:0.73rem;color:var(--text-4)}
footer a{color:var(--green);font-weight:500}

@media(max-width:560px){nav{padding:0 4%}.page{padding:1.5rem 4% 4rem}}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">ryugihyeon.dev</a>
  <ul class="nav-links">
    <li><a href="../index.html#projects">Projects</a></li>
    <li><a href="../blog.html" class="active">Blog</a></li>
    <li><a href="../index.html#credentials">Credentials</a></li>
    <li><a href="mailto:ryuoo0123@gmail.com" class="nav-contact-btn">Contact</a></li>
  </ul>
</nav>

<div class="page">
  <a class="back-link" href="../blog.html">← Blog 목록으로</a>
  <div id="post-content"><p style="color:var(--text-4);font-size:0.85rem">로딩 중...</p></div>
  <div class="post-nav">
    <a id="prev-post" href="#" class="post-nav-btn" style="visibility:hidden">← 이전 포스트</a>
    <a href="../blog.html" style="font-size:0.78rem;color:var(--text-3)">목록</a>
    <a id="next-post" href="#" class="post-nav-btn" style="visibility:hidden;text-align:right">다음 포스트 →</a>
  </div>
</div>

<footer>
  <p>© 2025 류기현 (Jeff) · <a href="https://github.com/RyuGiHyeon" target="_blank">GitHub</a></p>
  <p>Built with vanilla HTML · CSS · JS</p>
</footer>

<script src="../assets/js/data.js"></script>
<script>
const postCatCls={Security:'sec',Backend:'back',IaC:'iac',Network:''};
const BLOG_POST_ID='owasp-sqli-lab';
const id=BLOG_POST_ID;
const idx=BLOG_POSTS.findIndex(p=>p.id===id);
const post=BLOG_POSTS[idx];

if(!post){
  document.getElementById('post-content').innerHTML='<p style="color:var(--text-4)">포스트를 찾을 수 없습니다.</p>';
}else{
  document.title=`${post.title} — 류기현 (Jeff)`;
  const cc=postCatCls[post.category]||'';
  document.getElementById('post-content').innerHTML=`
    <div class="post-header">
      <div class="post-header-meta">
        <span class="post-cat ${cc}">${post.category}</span>
        <span class="post-date">${post.date}</span>
      </div>
      <h1>${post.title}</h1>
      <div class="post-tags">${post.tags.map(t=>`<span class="post-tag">#${t}</span>`).join('')}</div>
    </div>
    <div class="post-body">${post.content}</div>`;

  if(idx<BLOG_POSTS.length-1){
    const p=document.getElementById('prev-post');
    p.href=`${BLOG_POSTS[idx+1].id}.html`;
    p.textContent=`← ${BLOG_POSTS[idx+1].title.substring(0,22)}...`;
    p.style.visibility='visible';
  }
  if(idx>0){
    const n=document.getElementById('next-post');
    n.href=`${BLOG_POSTS[idx-1].id}.html`;
    n.textContent=`${BLOG_POSTS[idx-1].title.substring(0,22)}... →`;
    n.style.visibility='visible';
  }
}
</script>
</body>
</html>
