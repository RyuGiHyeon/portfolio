<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog / TIL — 류기현 (Jeff)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --green:#12b886;--green-lt:#e6fcf5;--green-dk:#0ca678;
  --bg:#f8f9fa;--surface:#ffffff;--border:#e9ecef;
  --text:#212529;--text-2:#495057;--text-3:#868e96;--text-4:#adb5bd;
  --sans:'Noto Sans KR',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px}
a{text-decoration:none;color:inherit}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:60px}
.nav-logo{font-size:1rem;font-weight:700;color:var(--green);letter-spacing:-0.01em}
.nav-links{display:flex;align-items:center;gap:0.2rem;list-style:none}
.nav-links a{font-size:0.82rem;color:var(--text-2);padding:0.4rem 0.8rem;border-radius:6px;transition:all .15s;font-weight:400}
.nav-links a:hover{background:var(--green-lt);color:var(--green)}
.nav-links a.active{background:var(--green-lt);color:var(--green);font-weight:500}
.nav-contact-btn{font-size:0.8rem;font-weight:500;padding:0.42rem 1.1rem;background:var(--green);color:#fff;border-radius:20px;transition:background .15s;margin-left:0.5rem}
.nav-contact-btn:hover{background:var(--green-dk);color:#fff}

/* PAGE */
.page{max-width:860px;margin:0 auto;padding:2.5rem 5% 5rem}

/* HEADER */
.page-header{margin-bottom:2rem}
.page-header h1{font-size:1.6rem;font-weight:700;color:var(--text);letter-spacing:-0.02em;margin-bottom:0.3rem}
.page-header p{font-size:0.85rem;color:var(--text-3);font-weight:300}

/* FILTER */
.filter-bar{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1.5rem}
.filter-btn{font-size:0.75rem;font-weight:500;padding:0.35rem 0.9rem;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-3);cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-lt)}
.filter-btn.active{border-color:var(--green);color:var(--green);background:var(--green-lt);font-weight:600}

/* POST CARDS */
.posts-wrap{display:flex;flex-direction:column;gap:0.75rem}

.post-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem 1.5rem;display:block;transition:box-shadow .2s,transform .2s,border-color .2s}
.post-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.07);transform:translateY(-2px);border-color:#dee2e6}
.post-meta{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.55rem}
.post-cat{font-size:0.68rem;padding:0.16rem 0.6rem;border-radius:10px;font-weight:600;background:var(--green-lt);color:var(--green)}
.post-cat.sec{background:#fff0f6;color:#c2255c}
.post-cat.back{background:#edf2ff;color:#4c6ef5}
.post-cat.iac{background:#fff4e6;color:#e67700}
.post-date{font-size:0.7rem;color:var(--text-4)}
.post-title{font-size:0.97rem;font-weight:600;color:var(--text);margin-bottom:0.38rem;line-height:1.4;letter-spacing:-0.01em}
.post-desc{font-size:0.81rem;color:var(--text-3);line-height:1.6;font-weight:300;margin-bottom:0.8rem}
.post-footer{display:flex;align-items:center;justify-content:space-between}
.post-tags{display:flex;gap:0.35rem;flex-wrap:wrap}
.post-tag{font-size:0.68rem;color:var(--text-4);padding:0.12rem 0.5rem;background:var(--bg);border-radius:8px;border:1px solid var(--border)}

.empty-state{text-align:center;padding:3rem 0;font-size:0.85rem;color:var(--text-4)}

footer{border-top:1px solid var(--border);margin-top:4rem;padding:1.5rem 5%;display:flex;justify-content:space-between;align-items:center;max-width:100%}
footer p{font-size:0.73rem;color:var(--text-4)}
footer a{color:var(--green);font-weight:500}

@media(max-width:560px){nav{padding:0 4%}.page{padding:1.5rem 4% 4rem}}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">ryugihyeon.dev</a>
  <ul class="nav-links">
    <li><a href="index.html#projects">Projects</a></li>
    <li><a href="blog.html" class="active">Blog</a></li>
    <li><a href="index.html#credentials">Credentials</a></li>
    <li><a href="mailto:ryuoo0123@gmail.com" class="nav-contact-btn">Contact</a></li>
    <li><a href="resume.html" target="_blank">Resume PDF</a></li>
  </ul>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Blog / TIL</h1>
    <p>공부하면서 기록한 것들. 삽질 포함.</p>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-cat="ALL">전체</button>
  </div>

  <div class="posts-wrap" id="posts-wrap"></div>
</div>

<footer>
  <p>© 2025 류기현 (Jeff) · <a href="https://github.com/RyuGiHyeon" target="_blank">GitHub</a></p>
  <p>Built with vanilla HTML · CSS · JS</p>
</footer>

<script src="assets/js/data/common.js"></script>
<script src="assets/js/data/blog.js"></script>
<script>
const postCatCls={Security:'sec',Backend:'back',IaC:'iac',Network:''};
const filterBar=document.getElementById('filter-bar');
const postsWrap=document.getElementById('posts-wrap');

// 카테고리 버튼 생성
const cats=[...new Set(BLOG_POSTS.map(p=>p.category))];
cats.forEach(cat=>{
  filterBar.innerHTML+=`<button class="filter-btn" data-cat="${cat}">${cat}</button>`;
});

function renderPosts(cat){
  const filtered=cat==='ALL'?[...BLOG_POSTS].reverse():BLOG_POSTS.filter(p=>p.category===cat).reverse();
  if(!filtered.length){
    postsWrap.innerHTML='<div class="empty-state">아직 포스트가 없습니다.</div>';
    return;
  }
  postsWrap.innerHTML=filtered.map(post=>{
    const cc=postCatCls[post.category]||'';
    return `<a class="post-card" href="pages/post.html?title=${encodeURIComponent(post.title)}">
      <div class="post-meta">
        <span class="post-cat ${cc}">${post.category}</span>
        <span class="post-date">${post.date}</span>
      </div>
      <div class="post-title">${post.title}</div>
      <div class="post-desc">${post.summary}</div>
      <div class="post-footer">
        <div class="post-tags">${post.tags.map(t=>`<span class="post-tag">#${t}</span>`).join('')}</div>
      </div>
    </a>`;
  }).join('');
}

filterBar.addEventListener('click',e=>{
  if(!e.target.classList.contains('filter-btn'))return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  renderPosts(e.target.dataset.cat);
});

renderPosts('ALL');
</script>
</body>
</html>
